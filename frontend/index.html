<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOS - Agentic AI Development Platform</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Monaco Editor loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
  
  <style>
    /* Premium Professional Slate Theme */
    body {
      background-color: #090b0d;
      color: #e2e8f0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      letter-spacing: -0.01em;
    }
    
    .font-mono-premium {
      font-family: 'JetBrains Mono', monospace;
    }
    
    /* Subtle professional borders and cards */
    .card-premium {
      background-color: rgba(17, 20, 24, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    
    .card-premium:hover {
      border-color: rgba(255, 255, 255, 0.09);
    }
    
    .border-premium {
      border-color: rgba(255, 255, 255, 0.05);
    }
    
    /* Custom premium scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    /* Interactive Graph Nodes */
    @keyframes pulse-node {
      0% { r: 24px; opacity: 0.1; }
      50% { opacity: 0.25; }
      100% { r: 36px; opacity: 0; }
    }
    
    .node-pulse {
      animation: pulse-node 2.2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: {
              950: '#090b0d',
              900: '#111418',
              800: '#1b2026',
              700: '#2c333c',
              600: '#485260'
            },
            accent: {
              blue: '#2f80ed',
              emerald: '#27ae60',
              amber: '#f2994a',
              rose: '#eb5757'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full flex flex-col antialiased">

  <div id="root" class="h-full flex flex-col"></div>

  <!-- React code with Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Define premium SVG Icons directly in React to prevent loading glitches
    const Icons = {
      Cpu: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 5h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2zM9 9h6v6H9V9z"/></svg>,
      Play: () => <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
      Folder: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>,
      File: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,
      Database: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>,
      Server: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/></svg>,
      Layout: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V16zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V16z"/></svg>,
      Shield: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>,
      Terminal: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>,
      Code: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>,
      Check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>,
      Clipboard: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>,
      Warning: () => <svg className="w-5 h-5 text-accent-amber" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    };

    // Node positioning for clean layout
    const AGENTS_CONFIG = {
      PM: { name: 'Project Manager', icon: Icons.Clipboard, color: 'stroke-emerald-500 fill-emerald-500/10 text-emerald-400', x: 300, y: 70 },
      Architect: { name: 'Software Architect', icon: Icons.Cpu, color: 'stroke-indigo-500 fill-indigo-500/10 text-indigo-400', x: 180, y: 170 },
      DB: { name: 'Database Eng', icon: Icons.Database, color: 'stroke-cyan-500 fill-cyan-500/10 text-cyan-400', x: 420, y: 170 },
      Backend: { name: 'Backend Eng', icon: Icons.Server, color: 'stroke-sky-500 fill-sky-500/10 text-sky-400', x: 120, y: 280 },
      Frontend: { name: 'Frontend Eng', icon: Icons.Layout, color: 'stroke-fuchsia-500 fill-fuchsia-500/10 text-fuchsia-400', x: 480, y: 280 },
      Reviewer: { name: 'Code Reviewer', icon: Icons.Code, color: 'stroke-amber-500 fill-amber-500/10 text-amber-400', x: 230, y: 340 },
      Security: { name: 'Security Eng', icon: Icons.Shield, color: 'stroke-rose-500 fill-rose-500/10 text-rose-400', x: 370, y: 340 },
      QA: { name: 'QA Engineer', icon: Icons.Check, color: 'stroke-teal-500 fill-teal-500/10 text-teal-400', x: 300, y: 240 },
      DevOps: { name: 'DevOps Eng', icon: Icons.Terminal, color: 'stroke-purple-500 fill-purple-500/10 text-purple-400', x: 300, y: 430 }
    };

    function App() {
      const [requirements, setRequirements] = useState('Build a secure backend API server with JWT login protection, MongoDB connection drivers, a dynamic React state-store layout page, unit tests, and production Docker configs.');
      const [wsState, setWsState] = useState({
        activeProject: null,
        isRunning: false,
        progress: 0,
        tokenUsage: { prompt: 0, completion: 0, cost: 0 },
        epics: [],
        tasks: [],
        logs: []
      });
      const [activeAgent, setActiveAgent] = useState('System');
      const [files, setFiles] = useState([]);
      const [selectedFilePath, setSelectedFilePath] = useState('');
      const [fileContent, setFileContent] = useState('// Select a generated file to view');
      const [userApproval, setUserApproval] = useState(null);
      const [activeTab, setActiveTab] = useState('code');
      
      const terminalEndRef = useRef(null);
      const editorContainerRef = useRef(null);
      const monacoEditorRef = useRef(null);

      // WebSocket Connection
      useEffect(() => {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        const ws = new WebSocket(wsUrl);

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === 'init') {
            setWsState(msg.data);
            if (msg.data.logs.length > 0) {
              const lastLog = msg.data.logs[msg.data.logs.length - 1];
              setActiveAgent(lastLog.agent);
              checkApproval(lastLog);
            }
            refreshFiles();
          } else if (msg.type === 'log') {
            setWsState(prev => {
              const newLogs = [...prev.logs, msg.data];
              return { ...prev, logs: newLogs };
            });
            setActiveAgent(msg.data.agent);
            checkApproval(msg.data);
            refreshFiles();
          } else if (msg.type === 'metrics') {
            setWsState(prev => ({
              ...prev,
              progress: msg.data.progress,
              tokenUsage: msg.data.tokenUsage
            }));
            setActiveAgent(msg.data.activeAgent);
          } else if (msg.type === 'finished') {
            setWsState(prev => ({ ...prev, isRunning: false, progress: 100 }));
            setActiveAgent('System');
            setUserApproval(null);
            refreshFiles();
          }
        };

        return () => ws.close();
      }, []);

      const checkApproval = (logEntry) => {
        if (logEntry.type === 'warning' && logEntry.metadata && logEntry.metadata.actionRequired) {
          setUserApproval({
            action: logEntry.metadata.actionRequired,
            choices: logEntry.metadata.choices || []
          });
        } else {
          setUserApproval(null);
        }
      };

      // Auto-scroll terminal
      useEffect(() => {
        if (terminalEndRef.current) {
          terminalEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [wsState.logs]);

      // Initialize Monaco Editor with premium theme colors
      useEffect(() => {
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
          if (editorContainerRef.current) {
            monaco.editor.defineTheme('devos-dark-theme', {
              base: 'vs-dark',
              inherit: true,
              rules: [],
              colors: {
                'editor.background': '#0f1115',
                'editor.foreground': '#e2e8f0',
                'editorLineNumber.foreground': '#485260',
                'editorLineNumber.activeForeground': '#e2e8f0',
                'editor.lineHighlightBackground': '#16191f'
              }
            });

            monacoEditorRef.current = monaco.editor.create(editorContainerRef.current, {
              value: fileContent,
              language: 'javascript',
              theme: 'devos-dark-theme',
              automaticLayout: true,
              minimap: { enabled: false },
              fontSize: 12,
              fontFamily: 'JetBrains Mono, monospace',
              lineHeight: 18,
              padding: { top: 12 }
            });
          }
        });

        return () => {
          if (monacoEditorRef.current) {
            monacoEditorRef.current.dispose();
          }
        };
      }, []);

      // Update Monaco content
      useEffect(() => {
        if (monacoEditorRef.current) {
          const model = monacoEditorRef.current.getModel();
          monacoEditorRef.current.setValue(fileContent);
          
          let lang = 'javascript';
          if (selectedFilePath.endsWith('.md')) lang = 'markdown';
          else if (selectedFilePath.endsWith('.json')) lang = 'json';
          else if (selectedFilePath.includes('Dockerfile')) lang = 'dockerfile';
          else if (selectedFilePath.endsWith('.yml') || selectedFilePath.endsWith('.yaml')) lang = 'yaml';
          
          monaco.editor.setModelLanguage(model, lang);
        }
      }, [fileContent, selectedFilePath]);

      const refreshFiles = async () => {
        try {
          const res = await fetch('/api/files');
          const data = await res.json();
          setFiles(data);
        } catch (e) {
          console.error(e);
        }
      };

      const handleSelectFile = async (path) => {
        setSelectedFilePath(path);
        try {
          const res = await fetch(`/api/file/content?path=${encodeURIComponent(path)}`);
          const text = await res.text();
          setFileContent(text);
        } catch (e) {
          setFileContent(`// Error loading file: ${e.message}`);
        }
      };

      const startPipeline = async () => {
        try {
          await fetch('/api/project', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ requirements })
          });
          setWsState(prev => ({
            ...prev,
            isRunning: true,
            progress: 0,
            logs: [],
            epics: [],
            tasks: []
          }));
          setUserApproval(null);
        } catch (e) {
          console.error(e);
        }
      };

      const approveAction = async (action) => {
        try {
          await fetch('/api/action/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action })
          });
          setUserApproval(null);
        } catch (e) {
          console.error(e);
        }
      };

      return (
        <div className="flex flex-col h-screen select-none">
          {/* Header */}
          <header className="px-6 py-4 flex items-center justify-between border-b border-premium bg-slate-950/60 shrink-0">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-lg bg-slate-800 flex items-center justify-center border border-premium">
                <Icons.Cpu />
              </div>
              <div>
                <h1 className="text-base font-semibold tracking-tight text-slate-100 flex items-center gap-2">
                  DevOS <span className="text-[10px] font-medium px-1.5 py-0.5 bg-slate-800 text-slate-400 rounded border border-premium">Multi-Agent Engine</span>
                </h1>
                <p className="text-[11px] text-slate-500 font-medium">Collaborative Developer Pipeline</p>
              </div>
            </div>

            {/* Metrics */}
            <div className="flex items-center gap-8 text-xs font-mono-premium">
              <div className="flex flex-col items-end">
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Usage</span>
                <span className="text-slate-300 font-semibold">
                  {((wsState.tokenUsage.prompt + wsState.tokenUsage.completion) || 0).toLocaleString()} tkn
                </span>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Cost</span>
                <span className="text-emerald-500 font-semibold">
                  ${(wsState.tokenUsage.cost || 0).toFixed(4)}
                </span>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Status</span>
                <span className="font-semibold flex items-center gap-1.5">
                  {wsState.isRunning ? (
                    <>
                      <span className="w-1.5 h-1.5 rounded-full bg-accent-blue animate-pulse"></span>
                      <span className="text-accent-blue">Running</span>
                    </>
                  ) : (
                    <>
                      <span className="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                      <span className="text-slate-500">Idle</span>
                    </>
                  )}
                </span>
              </div>
            </div>
          </header>

          {/* Main workspace */}
          <main className="flex-1 flex overflow-hidden min-h-0">
            {/* Left sidebar: Project brief & Roadmap */}
            <div className="w-80 flex flex-col border-r border-premium shrink-0 overflow-y-auto custom-scrollbar p-4 gap-4">
              <div className="card-premium p-4 flex flex-col gap-3">
                <h3 className="text-xs font-semibold text-slate-300 uppercase tracking-wider">Project Scope</h3>
                <textarea
                  className="w-full h-28 bg-slate-950/60 rounded-lg border border-premium p-2.5 text-xs focus:outline-none focus:border-slate-600 resize-none custom-scrollbar font-sans text-slate-300"
                  value={requirements}
                  onChange={(e) => setRequirements(e.target.value)}
                  disabled={wsState.isRunning}
                />
                <button
                  onClick={startPipeline}
                  disabled={wsState.isRunning || !requirements}
                  className={`w-full py-2.5 rounded-lg text-xs font-medium flex items-center justify-center gap-2 transition-all ${
                    wsState.isRunning 
                      ? 'bg-slate-800 text-slate-500 border border-premium cursor-not-allowed'
                      : 'bg-slate-100 hover:bg-white text-slate-950 font-semibold shadow-sm'
                  }`}
                >
                  <Icons.Play />
                  Start Agent Pipeline
                </button>
              </div>

              {/* Epics / Timeline */}
              <div className="flex-1 card-premium p-4 flex flex-col min-h-0">
                <div className="flex items-center justify-between border-b border-premium pb-2 mb-3">
                  <h3 className="text-xs font-semibold text-slate-300 uppercase tracking-wider">Project Timeline</h3>
                  <span className="text-[10px] font-mono-premium bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded border border-premium">
                    {wsState.progress}%
                  </span>
                </div>
                
                <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-1">
                  {wsState.epics.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-slate-600 py-10 text-xs">
                      <p>Pipeline not initiated.</p>
                    </div>
                  ) : (
                    wsState.epics.map((epic) => (
                      <div key={epic.id} className="border-l border-slate-800 pl-3 py-0.5">
                        <h4 className="text-xs font-semibold text-slate-300">{epic.name}</h4>
                        <div className="mt-2 space-y-2">
                          {wsState.tasks
                            .filter(t => t.epicId === epic.id)
                            .map(task => (
                              <div key={task.id} className="bg-slate-900/50 p-2 rounded border border-premium text-[11px] flex justify-between items-center">
                                <div className="flex flex-col gap-0.5 pr-2">
                                  <span className="text-slate-300 font-medium">{task.name}</span>
                                  <span className="text-[9px] text-slate-500 font-mono-premium">{task.assignee} Engineer</span>
                                </div>
                                <span className={`shrink-0 px-1.5 py-0.5 rounded text-[9px] font-mono-premium ${
                                  task.status === 'completed' ? 'text-accent-emerald bg-accent-emerald/10 border border-accent-emerald/20' :
                                  task.status === 'in-progress' ? 'text-accent-blue bg-accent-blue/10 border border-accent-blue/20 animate-pulse' :
                                  'text-slate-500 bg-slate-800 border border-premium'
                                }`}>
                                  {task.status}
                                </span>
                              </div>
                            ))}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>

            {/* Central Panel: Visual node graph & Code view tabs */}
            <div className="flex-1 flex flex-col overflow-hidden min-w-0">
              {/* Tab selector */}
              <div className="flex border-b border-premium shrink-0 bg-slate-950/40">
                <button
                  onClick={() => setActiveTab('code')}
                  className={`px-5 py-3 text-xs font-semibold flex items-center gap-1.5 border-b-2 transition-colors ${
                    activeTab === 'code' ? 'border-slate-300 text-slate-100' : 'border-transparent text-slate-500 hover:text-slate-300'
                  }`}
                >
                  <Icons.Code />
                  Repository Editor
                </button>
                <button
                  onClick={() => setActiveTab('knowledge')}
                  className={`px-5 py-3 text-xs font-semibold flex items-center gap-1.5 border-b-2 transition-colors ${
                    activeTab === 'knowledge' ? 'border-slate-300 text-slate-100' : 'border-transparent text-slate-500 hover:text-slate-300'
                  }`}
                >
                  <Icons.Cpu />
                  Agent Topology Graph
                </button>
              </div>

              {/* Code Tab */}
              {activeTab === 'code' && (
                <div className="flex-1 flex overflow-hidden min-h-0">
                  {/* File tree */}
                  <div className="w-56 border-r border-premium flex flex-col overflow-y-auto custom-scrollbar shrink-0 p-3 bg-slate-950/10">
                    <h3 className="text-[10px] font-semibold uppercase tracking-wider text-slate-500 mb-2 flex items-center gap-1">
                      <Icons.Folder /> files
                    </h3>
                    {files.length === 0 ? (
                      <p className="text-[11px] text-slate-600">No files generated.</p>
                    ) : (
                      <div className="space-y-1">
                        {files.map(item => {
                          if (item.type === 'directory') {
                            return (
                              <div key={item.name} className="flex flex-col">
                                <span className="flex items-center gap-1.5 text-xs font-semibold text-slate-400 py-1">
                                  <Icons.Folder /> {item.name}
                                </span>
                                <div className="pl-3 space-y-1 border-l border-slate-800 ml-1.5">
                                  {item.children.map(child => (
                                    <button
                                      key={child.path}
                                      onClick={() => handleSelectFile(child.path)}
                                      className={`w-full text-left py-1 px-1.5 rounded text-[11px] font-mono-premium flex items-center gap-1.5 hover:bg-slate-900 transition-colors ${
                                        selectedFilePath === child.path ? 'bg-slate-900 text-slate-100 font-semibold border-l border-slate-400' : 'text-slate-500'
                                      }`}
                                    >
                                      <Icons.File /> {child.name}
                                    </button>
                                  ))}
                                </div>
                              </div>
                            );
                          }
                          return (
                            <button
                              key={item.path}
                              onClick={() => handleSelectFile(item.path)}
                              className={`w-full text-left py-1 px-1.5 rounded text-[11px] font-mono-premium flex items-center gap-1.5 hover:bg-slate-900 transition-colors ${
                                selectedFilePath === item.path ? 'bg-slate-900 text-slate-100 font-semibold border-l border-slate-400' : 'text-slate-500'
                              }`}
                            >
                              <Icons.File /> {item.name}
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* Monaco Editor Container */}
                  <div className="flex-1 flex flex-col overflow-hidden min-w-0 bg-[#0f1115]">
                    <div className="bg-[#0b0c0f] px-4 py-2 border-b border-premium text-[11px] font-mono-premium text-slate-500 flex justify-between items-center">
                      <span>{selectedFilePath || 'Select a file to inspect'}</span>
                    </div>
                    <div ref={editorContainerRef} className="flex-1 min-h-0"></div>
                  </div>
                </div>
              )}

              {/* Agent Node Graph Tab */}
              {activeTab === 'knowledge' && (
                <div className="flex-1 relative overflow-hidden bg-slate-950/20 p-6 flex flex-col justify-between">
                  <div className="absolute top-5 left-5 z-10">
                    <h3 className="font-semibold text-slate-200 text-sm">System Topography Map</h3>
                    <p className="text-[11px] text-slate-500 font-mono-premium">Interactive message-bus node configuration</p>
                  </div>
                  
                  {/* SVG Node Graph */}
                  <div className="flex-1 flex items-center justify-center relative">
                    <svg className="w-[600px] h-[500px] overflow-visible" viewBox="0 0 600 500">
                      <defs>
                        <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                          <stop offset="0%" stopColor="rgba(255,255,255,0.02)" />
                          <stop offset="100%" stopColor="rgba(255,255,255,0.08)" />
                        </linearGradient>
                      </defs>
                      
                      {/* Connection lines */}
                      {Object.keys(AGENTS_CONFIG).map((agentKey) => {
                        const agent = AGENTS_CONFIG[agentKey];
                        return (
                          <line
                            key={`line-${agentKey}`}
                            x1={300}
                            y1={240}
                            x2={agent.x}
                            y2={agent.y}
                            stroke="url(#line-gradient)"
                            strokeWidth="1.2"
                            strokeDasharray="2 3"
                          />
                        );
                      })}

                      {/* Render Nodes */}
                      {Object.keys(AGENTS_CONFIG).map((agentKey) => {
                        const agent = AGENTS_CONFIG[agentKey];
                        const isActive = activeAgent === agentKey;
                        const AgentIcon = agent.icon;
                        
                        return (
                          <g key={agentKey} className="transition-all duration-300">
                            {isActive && (
                              <circle
                                cx={agent.x}
                                cy={agent.y}
                                r="28"
                                className="fill-slate-100/5 stroke-slate-100/20 node-pulse"
                              />
                            )}
                            <circle
                              cx={agent.x}
                              cy={agent.y}
                              r="20"
                              className={`${
                                isActive 
                                  ? 'fill-slate-800 stroke-slate-300 stroke-[1.5px]' 
                                  : 'fill-slate-950 stroke-slate-800 stroke-[1px] hover:stroke-slate-700'
                              } cursor-pointer transition-all`}
                              onClick={() => setActiveAgent(agentKey)}
                            />
                            {/* Short text labels */}
                            <text
                              x={agent.x}
                              y={agent.y + 32}
                              textAnchor="middle"
                              className={`text-[10px] font-medium tracking-tight ${isActive ? 'fill-slate-100' : 'fill-slate-500'}`}
                            >
                              {agent.name}
                            </text>
                            
                            {/* Icon overlay */}
                            <foreignObject x={agent.x - 8} y={agent.y - 8} width="16" height="16">
                              <div className={`flex items-center justify-center ${isActive ? 'text-slate-100' : 'text-slate-600'}`}>
                                <AgentIcon />
                              </div>
                            </foreignObject>
                          </g>
                        );
                      })}
                    </svg>
                  </div>

                  {/* Active Agent Detail Box */}
                  <div className="card-premium p-4 flex gap-4 items-center max-w-lg mx-auto mb-2 border-premium">
                    <div className="w-10 h-10 rounded-lg bg-slate-900 flex items-center justify-center border border-premium text-slate-300">
                      {AGENTS_CONFIG[activeAgent] ? React.createElement(AGENTS_CONFIG[activeAgent].icon) : <Icons.Cpu />}
                    </div>
                    <div>
                      <h4 className="font-semibold text-slate-200 text-xs flex items-center gap-2">
                        {AGENTS_CONFIG[activeAgent] ? AGENTS_CONFIG[activeAgent].name : activeAgent}
                        <span className="text-[9px] font-mono-premium bg-slate-800 text-slate-500 px-1 py-0.5 rounded border border-premium">PERSISTENT MEMORY</span>
                      </h4>
                      <p className="text-[11px] text-slate-400 mt-1 font-sans leading-relaxed">
                        {activeAgent === 'PM' ? 'Decomposes software request scopes into manageable Gantt milestones and assigns tickets to developers.' :
                         activeAgent === 'Architect' ? 'Defines directory layouts, API endpoints schemas, and tech-stack connection constraints.' :
                         activeAgent === 'DB' ? 'Writes relational and document schema controllers, handles migrations, and configs DB adapters.' :
                         activeAgent === 'Backend' ? 'Drafts system routers, auth middleware files, API CRUD routes, and integrates core servers.' :
                         activeAgent === 'Frontend' ? 'Develops UI templates, states stores using Zustand, and visual markup layouts.' :
                         activeAgent === 'Reviewer' ? 'Performs manual git diff inspections and raises comments on code quality and styling.' :
                         activeAgent === 'Security' ? 'Analyzes codebase credentials leakages, performs static code inspections, and prints warnings.' :
                         activeAgent === 'QA' ? 'Prepares test runners, asserts authentication flows, checks coverage logs, and reports bugs.' :
                         activeAgent === 'DevOps' ? 'Configures container setups (Docker files) and sets up automated integration runners.' :
                         'Orchestrates WebSocket events, handles user approvals, and updates system records.'}
                      </p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>

          {/* Bottom Panel: Terminal and Approvals */}
          <footer className="h-72 border-t border-premium flex flex-col shrink-0 overflow-hidden bg-slate-950">
            {/* Action Banner for approvals */}
            {userApproval && (
              <div className="bg-slate-900 border-b border-premium px-6 py-2.5 flex items-center justify-between text-xs font-medium">
                <div className="flex items-center gap-2">
                  <Icons.Warning />
                  <span className="text-slate-300">
                    {userApproval.action === 'approve_architecture' 
                      ? 'Architect created System Design. Review and approve architecture specification.'
                      : 'Reviewer generated Pull Request #1. Approve merging into default branch.'
                    }
                  </span>
                </div>
                <div className="flex items-center gap-2">
                  {userApproval.choices.map((choice) => (
                    <button
                      key={choice}
                      onClick={() => approveAction(userApproval.action)}
                      className={`px-3 py-1 rounded-md text-[11px] transition-all ${
                        choice.includes('Approve') || choice.includes('Merge')
                          ? 'bg-slate-100 hover:bg-white text-slate-950 font-semibold'
                          : 'bg-slate-800 hover:bg-slate-700 text-slate-400 border border-premium'
                      }`}
                    >
                      {choice}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Terminal */}
            <div className="flex-1 flex flex-col p-4 font-mono-premium text-[11px] overflow-hidden bg-[#0a0c0f]">
              <div className="flex items-center justify-between border-b border-premium pb-2 mb-2 shrink-0">
                <span className="text-slate-500 flex items-center gap-1.5 uppercase tracking-wider text-[10px] font-semibold">
                  <span className="w-1.5 h-1.5 rounded-full bg-accent-emerald"></span> Message Bus Event Logs
                </span>
                <button
                  onClick={() => setWsState(prev => ({ ...prev, logs: [] }))}
                  className="text-slate-600 hover:text-slate-400 text-[10px] font-semibold"
                >
                  CLEAR
                </button>
              </div>

              <div className="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 select-text pr-2">
                {wsState.logs.length === 0 ? (
                  <div className="text-slate-700 italic">Terminal stream initialized. Start pipeline to populate logs.</div>
                ) : (
                  wsState.logs.map((log) => {
                    let agentColor = 'text-slate-500';
                    if (log.agent === 'PM') agentColor = 'text-emerald-400';
                    else if (log.agent === 'Architect') agentColor = 'text-indigo-400';
                    else if (log.agent === 'DB') agentColor = 'text-cyan-400';
                    else if (log.agent === 'Backend') agentColor = 'text-sky-400';
                    else if (log.agent === 'Frontend') agentColor = 'text-fuchsia-400';
                    else if (log.agent === 'Reviewer') agentColor = 'text-amber-400';
                    else if (log.agent === 'Security') agentColor = 'text-rose-400';
                    else if (log.agent === 'QA') agentColor = 'text-teal-400';
                    else if (log.agent === 'DevOps') agentColor = 'text-purple-400';
                    
                    let logTypeColor = 'text-slate-400';
                    if (log.type === 'success') logTypeColor = 'text-emerald-400 font-medium';
                    else if (log.type === 'warning') logTypeColor = 'text-amber-400';
                    else if (log.type === 'error') logTypeColor = 'text-rose-400 font-semibold';
                    else if (log.type === 'chat') logTypeColor = 'text-slate-300';

                    return (
                      <div key={log.id} className="flex gap-2 leading-relaxed">
                        <span className="text-slate-700 shrink-0 select-none">
                          {new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                        </span>
                        <span className={`${agentColor} font-semibold shrink-0 w-20`}>[{log.agent}]</span>
                        <span className={`${logTypeColor} flex-1`}>{log.message}</span>
                      </div>
                    );
                  })
                )}
                <div ref={terminalEndRef}></div>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
