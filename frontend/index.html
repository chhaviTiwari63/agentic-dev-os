<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOS - Collaborative Multi-Agent Software Platform</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel Standalone to compile JSX on the fly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Monaco Editor loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
  
  <style>
    /* Custom Futuristic Glassmorphic Styles */
    body {
      background-color: #0b0f19;
      background-image: 
        radial-gradient(at 10% 20%, rgba(13, 20, 38, 0.9) 0px, transparent 50%),
        radial-gradient(at 90% 10%, rgba(29, 21, 62, 0.4) 0px, transparent 50%),
        radial-gradient(at 50% 80%, rgba(15, 32, 67, 0.6) 0px, transparent 50%);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }
    
    .glass {
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-active {
      border: 1px solid rgba(99, 102, 241, 0.4);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
    }
    
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 1; }
      50% { opacity: 0.5; }
      100% { transform: scale(1.15); opacity: 0; }
    }
    .agent-active-ring {
      animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); }
      50% { box-shadow: 0 0 25px rgba(99, 102, 241, 0.5); }
    }
    .glow-purple {
      animation: pulse-glow 3s ease-in-out infinite;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#0b0f19',
              card: 'rgba(17, 24, 39, 0.6)',
              primary: '#6366f1',
              secondary: '#a855f7'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full text-slate-100 flex flex-col">

  <div id="root" class="h-full flex flex-col"></div>

  <!-- React code with Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Define agent metadata for node graph
    const AGENTS_CONFIG = {
      PM: { name: 'Project Manager', icon: 'clipboard-list', color: 'text-emerald-400', border: 'border-emerald-500/50', bg: 'bg-emerald-950/30', x: 120, y: 80 },
      Architect: { name: 'Software Architect', icon: 'git-merge', color: 'text-indigo-400', border: 'border-indigo-500/50', bg: 'bg-indigo-950/30', x: 260, y: 80 },
      DB: { name: 'Database Eng', icon: 'database', color: 'text-cyan-400', border: 'border-cyan-500/50', bg: 'bg-cyan-950/30', x: 400, y: 80 },
      Backend: { name: 'Backend Eng', icon: 'server', color: 'text-sky-400', border: 'border-sky-500/50', bg: 'bg-sky-950/30', x: 190, y: 190 },
      Frontend: { name: 'Frontend Eng', icon: 'layout', color: 'text-fuchsia-400', border: 'border-fuchsia-500/50', bg: 'bg-fuchsia-950/30', x: 330, y: 190 },
      Reviewer: { name: 'Code Reviewer', icon: 'code', color: 'text-amber-400', border: 'border-amber-500/50', bg: 'bg-amber-950/30', x: 120, y: 300 },
      Security: { name: 'Security Eng', icon: 'shield-check', color: 'text-rose-400', border: 'border-rose-500/50', bg: 'bg-rose-950/30', x: 260, y: 300 },
      QA: { name: 'QA Engineer', icon: 'check-square', color: 'text-teal-400', border: 'border-teal-500/50', bg: 'bg-teal-950/30', x: 400, y: 300 },
      DevOps: { name: 'DevOps Eng', icon: 'terminal', color: 'text-purple-400', border: 'border-purple-500/50', bg: 'bg-purple-950/30', x: 260, y: 410 }
    };

    function App() {
      const [requirements, setRequirements] = useState('Build a secure backend API server with JWT login protection, MongoDB connection drivers, a dynamic React state-store layout page, unit tests, and production Docker configs.');
      const [wsState, setWsState] = useState({
        activeProject: null,
        isRunning: false,
        progress: 0,
        tokenUsage: { prompt: 0, completion: 0, cost: 0 },
        epics: [],
        tasks: [],
        logs: []
      });
      const [activeAgent, setActiveAgent] = useState('System');
      const [files, setFiles] = useState([]);
      const [selectedFilePath, setSelectedFilePath] = useState('');
      const [fileContent, setFileContent] = useState('// Select a generated file to view');
      const [userApproval, setUserApproval] = useState(null); // { action: '...', choices: [] }
      const [activeTab, setActiveTab] = useState('code'); // code, knowledge, settings
      
      const terminalEndRef = useRef(null);
      const editorContainerRef = useRef(null);
      const monacoEditorRef = useRef(null);

      // WebSocket Connection
      useEffect(() => {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        const ws = new WebSocket(wsUrl);

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === 'init') {
            setWsState(msg.data);
            if (msg.data.logs.length > 0) {
              const lastLog = msg.data.logs[msg.data.logs.length - 1];
              setActiveAgent(lastLog.agent);
              checkApproval(lastLog);
            }
            refreshFiles();
          } else if (msg.type === 'log') {
            setWsState(prev => {
              const newLogs = [...prev.logs, msg.data];
              return { ...prev, logs: newLogs };
            });
            setActiveAgent(msg.data.agent);
            checkApproval(msg.data);
            refreshFiles();
          } else if (msg.type === 'metrics') {
            setWsState(prev => ({
              ...prev,
              progress: msg.data.progress,
              tokenUsage: msg.data.tokenUsage
            }));
            setActiveAgent(msg.data.activeAgent);
          } else if (msg.type === 'finished') {
            setWsState(prev => ({ ...prev, isRunning: false, progress: 100 }));
            setActiveAgent('System');
            setUserApproval(null);
            refreshFiles();
          }
        };

        return () => ws.close();
      }, []);

      const checkApproval = (logEntry) => {
        if (logEntry.type === 'warning' && logEntry.metadata && logEntry.metadata.actionRequired) {
          setUserApproval({
            action: logEntry.metadata.actionRequired,
            choices: logEntry.metadata.choices || []
          });
        } else {
          setUserApproval(null);
        }
      };

      // Auto-scroll terminal
      useEffect(() => {
        if (terminalEndRef.current) {
          terminalEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [wsState.logs]);

      // Initialize Monaco Editor
      useEffect(() => {
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
          if (editorContainerRef.current) {
            monacoEditorRef.current = monaco.editor.create(editorContainerRef.current, {
              value: fileContent,
              language: 'javascript',
              theme: 'vs-dark',
              automaticLayout: true,
              minimap: { enabled: false },
              fontSize: 13,
              lineHeight: 20,
              padding: { top: 12 }
            });
          }
        });

        return () => {
          if (monacoEditorRef.current) {
            monacoEditorRef.current.dispose();
          }
        };
      }, []);

      // Update Monaco content
      useEffect(() => {
        if (monacoEditorRef.current) {
          const model = monacoEditorRef.current.getModel();
          monacoEditorRef.current.setValue(fileContent);
          
          // Set language based on extension
          let lang = 'javascript';
          if (selectedFilePath.endsWith('.md')) lang = 'markdown';
          else if (selectedFilePath.endsWith('.json')) lang = 'json';
          else if (selectedFilePath.includes('Dockerfile')) lang = 'dockerfile';
          else if (selectedFilePath.endsWith('.yml') || selectedFilePath.endsWith('.yaml')) lang = 'yaml';
          
          monaco.editor.setModelLanguage(model, lang);
        }
      }, [fileContent, selectedFilePath]);

      const refreshFiles = async () => {
        try {
          const res = await fetch('/api/files');
          const data = await res.json();
          setFiles(data);
        } catch (e) {
          console.error(e);
        }
      };

      const handleSelectFile = async (path) => {
        setSelectedFilePath(path);
        try {
          const res = await fetch(`/api/file/content?path=${encodeURIComponent(path)}`);
          const text = await res.text();
          setFileContent(text);
        } catch (e) {
          setFileContent(`// Error loading file: ${e.message}`);
        }
      };

      const startPipeline = async () => {
        try {
          await fetch('/api/project', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ requirements })
          });
          setWsState(prev => ({
            ...prev,
            isRunning: true,
            progress: 0,
            logs: [],
            epics: [],
            tasks: []
          }));
          setUserApproval(null);
        } catch (e) {
          console.error(e);
        }
      };

      const approveAction = async (action) => {
        try {
          await fetch('/api/action/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action })
          });
          setUserApproval(null);
        } catch (e) {
          console.error(e);
        }
      };

      // Helper to render icon
      const renderIcon = (name, className = 'w-5 h-5') => {
        // Simple fallback until Lucide processes
        return <i data-lucide={name} className={className}></i>;
      };

      // Process lucide icons after renders
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      return (
        <div className="flex flex-col h-screen select-none">
          {/* Header */}
          <header class="glass flex items-center justify-between px-6 py-4 border-b border-white/10 shrink-0">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-fuchsia-600 flex items-center justify-center glow-purple">
                <i data-lucide="cpu" className="w-6 h-6 text-white"></i>
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                  DevOS <span className="text-xs font-semibold px-2 py-0.5 bg-indigo-500/20 text-indigo-300 rounded border border-indigo-500/30 ml-2">v1.0.0 Alpha</span>
                </h1>
                <p className="text-xs text-slate-400">Collaborative Multi-Agent Developer Platform</p>
              </div>
            </div>

            {/* Metrics */}
            <div className="flex items-center gap-8">
              <div className="flex flex-col items-end">
                <span className="text-xs text-slate-400">Total Tokens</span>
                <span className="font-mono text-sm text-indigo-300">
                  {((wsState.tokenUsage.prompt + wsState.tokenUsage.completion) || 0).toLocaleString()}
                </span>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-xs text-slate-400">Total Cost</span>
                <span className="font-mono text-sm text-emerald-400">
                  ${(wsState.tokenUsage.cost || 0).toFixed(4)}
                </span>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-xs text-slate-400">Pipeline Status</span>
                <span className="text-sm font-semibold flex items-center gap-1.5">
                  {wsState.isRunning ? (
                    <>
                      <span className="w-2 h-2 rounded-full bg-indigo-500 animate-ping"></span>
                      <span className="text-indigo-400">Processing...</span>
                    </>
                  ) : (
                    <>
                      <span className="w-2 h-2 rounded-full bg-slate-500"></span>
                      <span className="text-slate-400">Idle</span>
                    </>
                  )}
                </span>
              </div>
            </div>
          </header>

          {/* Main workspace */}
          <main className="flex-1 flex overflow-hidden min-h-0">
            {/* Left sidebar: Project brief & Roadmap */}
            <div className="w-96 flex flex-col border-r border-white/10 shrink-0 overflow-y-auto custom-scrollbar p-5 gap-5">
              <div className="glass rounded-2xl p-4 flex flex-col gap-4">
                <div className="flex items-center gap-2 border-b border-white/5 pb-2">
                  <i data-lucide="edit-3" className="w-5 h-5 text-indigo-400"></i>
                  <h3 className="font-bold text-slate-200">Describe Project Requirements</h3>
                </div>
                <textarea
                  className="w-full h-32 bg-slate-950/50 rounded-xl border border-white/10 p-3 text-sm focus:outline-none focus:border-indigo-500/50 resize-none custom-scrollbar"
                  value={requirements}
                  onChange={(e) => setRequirements(e.target.value)}
                  placeholder="Describe your app..."
                  disabled={wsState.isRunning}
                />
                <button
                  onClick={startPipeline}
                  disabled={wsState.isRunning || !requirements}
                  className={`w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${
                    wsState.isRunning 
                      ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 cursor-not-allowed'
                      : 'bg-indigo-600 hover:bg-indigo-500 text-white hover:shadow-lg hover:shadow-indigo-500/20'
                  }`}
                >
                  <i data-lucide="play" className="w-5 h-5"></i>
                  Start Agent Team
                </button>
              </div>

              {/* Epics / Timeline */}
              <div className="flex-1 glass rounded-2xl p-4 flex flex-col min-h-0">
                <div className="flex items-center justify-between border-b border-white/5 pb-2 mb-3">
                  <div className="flex items-center gap-2">
                    <i data-lucide="milestone" className="w-5 h-5 text-emerald-400"></i>
                    <h3 className="font-bold text-slate-200">Roadmap & Timeline</h3>
                  </div>
                  <span className="text-xs bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-full font-bold">
                    {wsState.progress}% Done
                  </span>
                </div>
                
                <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-1">
                  {wsState.epics.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-slate-500 py-10">
                      <i data-lucide="layers" className="w-12 h-12 mb-2 stroke-1"></i>
                      <p className="text-sm">No active roadmaps</p>
                    </div>
                  ) : (
                    wsState.epics.map((epic, eIdx) => (
                      <div key={epic.id} className="border-l border-white/10 pl-3 py-1">
                        <h4 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                          <span className="w-2 h-2 rounded-full bg-indigo-500/60"></span>
                          {epic.name}
                        </h4>
                        <div className="mt-2 space-y-2">
                          {wsState.tasks
                            .filter(t => t.epicId === epic.id)
                            .map(task => (
                              <div key={task.id} className="bg-slate-900/40 p-2.5 rounded-lg border border-white/5 text-xs flex justify-between items-center">
                                <div className="flex flex-col gap-0.5 pr-2">
                                  <span className="text-slate-300 font-medium">{task.name}</span>
                                  <span className="text-[10px] text-slate-500">Assignee: {task.assignee} ({task.complexity})</span>
                                </div>
                                <span className={`shrink-0 px-2 py-0.5 rounded-full text-[10px] font-bold ${
                                  task.status === 'completed' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' :
                                  task.status === 'in-progress' ? 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 animate-pulse' :
                                  'bg-slate-800 text-slate-400 border border-white/5'
                                }`}>
                                  {task.status}
                                </span>
                              </div>
                            ))}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>

            {/* Central Panel: Visual node graph & Code view tabs */}
            <div className="flex-1 flex flex-col overflow-hidden min-w-0">
              {/* Tab selector */}
              <div className="glass-active flex border-b border-white/10 shrink-0">
                <button
                  onClick={() => setActiveTab('code')}
                  className={`px-6 py-3.5 text-sm font-bold flex items-center gap-2 border-b-2 transition-colors ${
                    activeTab === 'code' ? 'border-indigo-500 text-indigo-400' : 'border-transparent text-slate-400 hover:text-slate-200'
                  }`}
                >
                  <i data-lucide="code" className="w-4 h-4"></i>
                  Codebase & Editor
                </button>
                <button
                  onClick={() => setActiveTab('knowledge')}
                  className={`px-6 py-3.5 text-sm font-bold flex items-center gap-2 border-b-2 transition-colors ${
                    activeTab === 'knowledge' ? 'border-indigo-500 text-indigo-400' : 'border-transparent text-slate-400 hover:text-slate-200'
                  }`}
                >
                  <i data-lucide="network" className="w-4 h-4"></i>
                  Agent Collaboration Graph
                </button>
              </div>

              {/* Code Tab: Workspace with Monaco Editor & file tree */}
              {activeTab === 'code' && (
                <div className="flex-1 flex overflow-hidden min-h-0">
                  {/* File tree */}
                  <div className="w-64 border-r border-white/10 flex flex-col overflow-y-auto custom-scrollbar shrink-0 p-4 bg-slate-950/20">
                    <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 flex items-center gap-1.5">
                      <i data-lucide="folder-git-2" className="w-4 h-4 text-slate-400"></i> Generated Repository
                    </h3>
                    {files.length === 0 ? (
                      <p className="text-xs text-slate-600 mt-2">No files generated yet.</p>
                    ) : (
                      <div className="space-y-1">
                        {files.map(item => {
                          if (item.type === 'directory') {
                            return (
                              <div key={item.name} className="flex flex-col">
                                <span className="flex items-center gap-2 text-xs font-semibold text-slate-400 py-1.5">
                                  <i data-lucide="folder" className="w-4 h-4 text-indigo-400"></i> {item.name}
                                </span>
                                <div className="pl-4 space-y-1">
                                  {item.children.map(child => (
                                    <button
                                      key={child.path}
                                      onClick={() => handleSelectFile(child.path)}
                                      className={`w-full text-left py-1 px-2 rounded text-xs flex items-center gap-2 hover:bg-white/5 transition-colors ${
                                        selectedFilePath === child.path ? 'bg-indigo-500/10 text-indigo-300 font-semibold' : 'text-slate-400'
                                      }`}
                                    >
                                      <i data-lucide="file-code" className="w-3.5 h-3.5 text-slate-500"></i> {child.name}
                                    </button>
                                  ))}
                                </div>
                              </div>
                            );
                          }
                          return (
                            <button
                              key={item.path}
                              onClick={() => handleSelectFile(item.path)}
                              className={`w-full text-left py-1 px-2 rounded text-xs flex items-center gap-2 hover:bg-white/5 transition-colors ${
                                selectedFilePath === item.path ? 'bg-indigo-500/10 text-indigo-300 font-semibold' : 'text-slate-400'
                              }`}
                            >
                              <i data-lucide="file" className="w-3.5 h-3.5 text-slate-500"></i> {item.name}
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* Monaco Editor Container */}
                  <div className="flex-1 flex flex-col overflow-hidden min-w-0 bg-[#1e1e1e]">
                    <div className="bg-[#181818] px-4 py-2 border-b border-white/5 text-xs font-mono text-slate-400 flex justify-between items-center">
                      <span>{selectedFilePath || 'No file selected'}</span>
                      {selectedFilePath && (
                        <div className="flex items-center gap-3">
                          <span className="text-[10px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">RAG Indexed</span>
                          <span className="text-[10px] bg-emerald-500/20 text-emerald-400 px-1.5 py-0.5 rounded">Verified Clean</span>
                        </div>
                      )}
                    </div>
                    <div ref={editorContainerRef} className="flex-1 min-h-0"></div>
                  </div>
                </div>
              )}

              {/* Agent Node Graph Tab */}
              {activeTab === 'knowledge' && (
                <div className="flex-1 relative overflow-hidden bg-slate-950/40 p-6 flex flex-col justify-between">
                  <div className="absolute top-5 left-5 z-10">
                    <h3 className="font-bold text-slate-200">Orchestrator Topology</h3>
                    <p className="text-xs text-slate-500">Node links represent information flows, message bus routes, and data state-shares.</p>
                  </div>
                  
                  {/* SVG Node Graph */}
                  <div className="flex-1 flex items-center justify-center relative">
                    <svg className="w-[600px] h-[500px] overflow-visible">
                      {/* Define lines connecting nodes */}
                      <defs>
                        <linearGradient id="gradient-line" x1="0%" y1="0%" x2="100%" y2="100%">
                          <stop offset="0%" stopColor="#6366f1" stopOpacity="0.4" />
                          <stop offset="100%" stopColor="#a855f7" stopOpacity="0.4" />
                        </linearGradient>
                      </defs>
                      
                      {/* System Lines */}
                      {Object.keys(AGENTS_CONFIG).map((agentKey) => {
                        const agent = AGENTS_CONFIG[agentKey];
                        // Connect everyone to central node (Architect/System)
                        return (
                          <line
                            key={`line-${agentKey}`}
                            x1={260}
                            y1={190}
                            x2={agent.x}
                            y2={agent.y}
                            stroke="url(#gradient-line)"
                            strokeWidth="1.5"
                            strokeDasharray="4 4"
                          />
                        );
                      })}

                      {/* Render Nodes */}
                      {Object.keys(AGENTS_CONFIG).map((agentKey) => {
                        const agent = AGENTS_CONFIG[agentKey];
                        const isActive = activeAgent === agentKey;
                        return (
                          <g key={agentKey}>
                            {isActive && (
                              <circle
                                cx={agent.x}
                                cy={agent.y}
                                r="38"
                                className="fill-indigo-500/20 stroke-indigo-500/40 agent-active-ring"
                              />
                            )}
                            <circle
                              cx={agent.x}
                              cy={agent.y}
                              r="28"
                              className={`${
                                isActive 
                                  ? 'fill-indigo-900/60 stroke-indigo-400 stroke-2' 
                                  : 'fill-slate-900/80 stroke-white/10'
                              } transition-all duration-300 cursor-pointer`}
                              onClick={() => setActiveAgent(agentKey)}
                            />
                            {/* Short text labels */}
                            <text
                              x={agent.x}
                              y={agent.y + 42}
                              textAnchor="middle"
                              className={`text-[10px] font-bold ${isActive ? 'fill-indigo-300 font-semibold' : 'fill-slate-400'}`}
                            >
                              {agent.name}
                            </text>
                            
                            {/* Icon overlay */}
                            <foreignObject x={agent.x - 10} y={agent.y - 10} width="20" height="20">
                              <div className={`flex items-center justify-center ${agent.color}`}>
                                <i data-lucide={agent.icon} className="w-5 h-5"></i>
                              </div>
                            </foreignObject>
                          </g>
                        );
                      })}
                    </svg>
                  </div>

                  {/* Active Agent Inspector Detail Card */}
                  <div className="glass rounded-2xl p-4 flex gap-4 items-center max-w-xl mx-auto mb-2 border border-indigo-500/20">
                    <div className={`w-12 h-12 rounded-xl bg-slate-900 flex items-center justify-center border border-white/10 ${AGENTS_CONFIG[activeAgent] ? AGENTS_CONFIG[activeAgent].color : 'text-slate-400'}`}>
                      <i data-lucide={AGENTS_CONFIG[activeAgent] ? AGENTS_CONFIG[activeAgent].icon : 'cpu'} className="w-6 h-6"></i>
                    </div>
                    <div>
                      <h4 className="font-bold text-slate-200 flex items-center gap-2">
                        {AGENTS_CONFIG[activeAgent] ? AGENTS_CONFIG[activeAgent].name : activeAgent}
                        <span className="text-[10px] uppercase bg-indigo-500/20 text-indigo-300 px-1.5 py-0.5 rounded font-mono">Memory Locked</span>
                      </h4>
                      <p className="text-xs text-slate-400 mt-0.5">
                        {activeAgent === 'PM' ? 'Creates user requirement roadmaps, milestones, epic decompositions, and coordinates developer tasks.' :
                         activeAgent === 'Architect' ? 'Establishes technical stack configurations, modular dependencies, and compiles data structure maps.' :
                         activeAgent === 'DB' ? 'Prepares schema code scripts, data integrity pipelines, and configures SQL/NoSQL drivers.' :
                         activeAgent === 'Backend' ? 'Drafts system routes, endpoint services, security models, and runs server modules.' :
                         activeAgent === 'Frontend' ? 'Develops visual layout structures, local state interfaces, responsive css modules, and components.' :
                         activeAgent === 'Reviewer' ? 'Inspects codebase change sets, processes PR files, and comments line-by-line on syntax structures.' :
                         activeAgent === 'Security' ? 'Performs static security analysis checkups, searches database credentials issues, and runs check tests.' :
                         activeAgent === 'QA' ? 'Prepares unit-testing routines, executes endpoint tests, checks coverage metrics, and reports bug logs.' :
                         activeAgent === 'DevOps' ? 'Prepares configurations scripts (Docker), configures deployment triggers, and runs build servers.' :
                         'System controller message router and orchestrator manager.'}
                      </p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>

          {/* Bottom Panel: Terminal and Approvals */}
          <footer class="h-80 border-t border-white/10 flex flex-col shrink-0 overflow-hidden">
            {/* Action Banner for approvals */}
            {userApproval && (
              <div className="bg-indigo-950/80 border-b border-indigo-500/30 px-6 py-3 flex items-center justify-between text-sm animate-pulse glow-purple">
                <div className="flex items-center gap-3">
                  <i data-lucide="alert-triangle" className="w-5 h-5 text-indigo-400"></i>
                  <span className="text-slate-200 font-semibold font-medium">
                    {userApproval.action === 'approve_architecture' 
                      ? 'Architect created System Spec layout. Approve architecture proposal to proceed.'
                      : 'Code Reviewer raised Pull Request #1. Approve merging change set.'
                    }
                  </span>
                </div>
                <div className="flex items-center gap-3">
                  {userApproval.choices.map((choice) => (
                    <button
                      key={choice}
                      onClick={() => approveAction(userApproval.action)}
                      className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${
                        choice.includes('Approve') || choice.includes('Merge')
                          ? 'bg-indigo-600 hover:bg-indigo-500 text-white hover:shadow-lg'
                          : 'bg-slate-800 hover:bg-slate-700 text-slate-300 border border-white/10'
                      }`}
                    >
                      {choice}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Terminal */}
            <div className="flex-1 flex flex-col bg-slate-950 p-4 font-mono text-xs overflow-hidden">
              <div className="flex items-center justify-between border-b border-white/5 pb-2 mb-2 shrink-0">
                <span className="text-slate-400 flex items-center gap-2">
                  <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> Live Agent Message Bus & Logs
                </span>
                <button
                  onClick={() => setWsState(prev => ({ ...prev, logs: [] }))}
                  className="text-slate-500 hover:text-slate-300 font-semibold"
                >
                  Clear Console
                </button>
              </div>

              <div className="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 select-text pr-2">
                {wsState.logs.length === 0 ? (
                  <div className="text-slate-600">Console empty. Start the agent team to see output streams.</div>
                ) : (
                  wsState.logs.map((log) => {
                    let agentColor = 'text-slate-400';
                    if (AGENTS_CONFIG[log.agent]) agentColor = AGENTS_CONFIG[log.agent].color;
                    
                    let logTypeColor = 'text-slate-300';
                    if (log.type === 'success') logTypeColor = 'text-emerald-400';
                    else if (log.type === 'warning') logTypeColor = 'text-amber-400 font-semibold';
                    else if (log.type === 'error') logTypeColor = 'text-rose-400 font-bold';
                    else if (log.type === 'chat') logTypeColor = 'text-slate-300 italic';

                    return (
                      <div key={log.id} className="flex gap-2 leading-relaxed">
                        <span className="text-slate-600 shrink-0">
                          {new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                        </span>
                        <span className={`${agentColor} font-bold shrink-0 w-24`}>[{log.agent}]</span>
                        <span className={`${logTypeColor} flex-1`}>{log.message}</span>
                      </div>
                    );
                  })
                )}
                <div ref={terminalEndRef}></div>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
